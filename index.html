<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A small, static, Markdown-driven wiki.">
    <title>Personal Wiki</title>
    <script>
      (() => {
        let theme;
        try {
          theme = localStorage.getItem('personal-wiki-theme');
        } catch (error) {
          theme = null;
        }
        document.documentElement.dataset.theme = theme === 'light' ? 'light' : 'dark';
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=20260719-1">
  </head>
  <body>
    <header class="site-header">
      <div class="brand-line">
        <a class="brand" href="#/home" aria-label="Personal Wiki home">
          <img class="brand-mark" src="assets/me.svg?v=20260710-1" alt="" aria-hidden="true">
          <span class="brand-text">Personal Wiki</span>
        </a>
        <nav class="brand-path" id="current-path" aria-label="Current page path">(/home)</nav>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">☀</button>
        <button class="menu-button" type="button" aria-expanded="false" aria-controls="sidebar">Menu</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <nav aria-label="Wiki pages">
          <p class="nav-label">Contents</p>
          <a href="#/home">Home</a>
          <a href="#/music">Music</a>
          <a href="#/cubing">Cubing</a>
          <a href="#/microblog">Microblog</a>
        </nav>
        <p class="sidebar-note">Plain text in.<br>Static HTML out.</p>
      </aside>

      <main id="content" class="content" tabindex="-1" aria-live="polite">
        <p class="loading">Loading…</p>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.6.3/dist/abcjs-basic-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://unpkg.com/@strudel/web@1.0.3"></script>
    <script src="cube-notation.js?v=20260708-4"></script>
    <script type="module" src="app.js?v=20260719-1"></script>
  </body>
</html>
